name: Render And Upload Kanji Video

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Pipeline run_id (S3のプレフィックス)"
        type: string
        required: false
        default: ""
      layout_mode:
        description: "レイアウトモード"
        type: string
        required: true
        default: "type3"
      use_dummy_assets:
        description: "Use generated dummy assets"
        type: boolean
        required: true
        default: true
      upload_to_youtube:
        description: "Upload rendered video to YouTube"
        type: boolean
        required: true
        default: false

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-northeast-1
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_PREFIX: ${{ secrets.S3_PREFIX }}
      YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
      YOUTUBE_CLIENT_SECRETS_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials
        if: ${{ !inputs.use_dummy_assets }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare assets (dummy)
        if: ${{ inputs.use_dummy_assets }}
        run: |
          python scripts/generate_dummy_assets.py
          mkdir -p assets/input
          cp -r assets/dummy/* assets/input/
          # 構成タイプに応じてダミーJSONを選択
          if [ "${{ inputs.layout_mode }}" = "type1_type2" ]; then
            cp scripts/dummy_video_render_type1_type2.json assets/input/video_render.json
          else
            cp scripts/dummy_video_render_type3.json assets/input/video_render.json
          fi

      - name: Debug assets
        run: |
          echo "=== assets/input の中身 ==="
          ls -la assets/input/
          echo ""
          echo "=== type画像の確認 ==="
          ls -la assets/input/type*.png || echo "type画像が見つかりません"
          echo ""
          echo "=== main_question.png の確認 ==="
          ls -la assets/input/main_question.png || echo "main_question.pngが見つかりません"

      - name: Verify required assets
        run: |
          for f in type1.png type2.png type3.png main_question.png main_bgm.mp3 opening.mp4 ending.mp4; do
            if [ ! -f "assets/input/$f" ]; then
              echo "ERROR: assets/input/$f が見つかりません"
              exit 1
            fi
          done
          echo "必須アセット確認OK"

      - name: Prepare assets (S3)
        if: ${{ !inputs.use_dummy_assets }}
        run: |
          python scripts/download_assets.py \
            --bucket "$S3_BUCKET" \
            --prefix "$S3_PREFIX/${{ inputs.run_id }}/" \
            --dest assets/input

      - name: Render video (no upload)
        if: ${{ !inputs.upload_to_youtube }}
        run: |
          python scripts/run_kanji_pipeline.py \
            --job assets/input/video_render.json \
            --assets assets/input \
            --output out/kanji_quiz.mp4

      - name: Render video and upload to YouTube
        if: ${{ inputs.upload_to_youtube }}
        run: |
          python scripts/run_kanji_pipeline.py \
            --job assets/input/video_render.json \
            --assets assets/input \
            --output out/kanji_quiz.mp4 \
            --upload \
            --title "漢字穴埋めクイズ Vol.1" \
            --description "自動生成漢字クイズ動画" \
            --privacy "private"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-kanji-video
          path: out/kanji_quiz.mp4
